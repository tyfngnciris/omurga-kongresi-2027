<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bağlantı Yok — Türk Omurga Kongresi</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1F3864;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .box { max-width: 360px; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 14px; color: #C7EDEA; margin-bottom: 20px; }
    button {
      background: #2CA6A4;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>İnternet bağlantısı yok</h1>
    <p>Bu sayfayı görüntülemek için internet bağlantısı gerekiyor. Bağlantınızı kontrol edip tekrar deneyin.</p>
    <button onclick="location.reload()">Tekrar Dene</button>
  </div>
</body>
</html>
